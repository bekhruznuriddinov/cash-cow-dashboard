<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Cow Agent — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b0f1a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
  header h1 span { color: #4ade80; }

  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .updated { font-size: 0.78rem; color: #64748b; }

  .toggle-btn {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #1e2d45;
    background: #131929;
    color: #64748b;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .toggle-btn:hover { color: #e2e8f0; border-color: #334155; }
  .toggle-btn.revealed { color: #fbbf24; border-color: #92400e; }

  /* Sensitive values: blurred by default, revealed on toggle */
  .sens {
    display: inline-block;
    filter: blur(6px);
    transition: filter 0.2s;
    border-radius: 4px;
  }
  body.revealed .sens { filter: none; }

  .grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    gap: 16px;
  }

  .stats { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }

  .card {
    background: #131929;
    border: 1px solid #1e2d45;
    border-radius: 12px;
    padding: 20px 24px;
    min-width: 0;
  }

  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .stat-sub {
    font-size: 0.78rem;
    color: #475569;
    margin-top: 6px;
  }
  .green  { color: #4ade80; }
  .red    { color: #f87171; }
  .neutral{ color: #e2e8f0; }

  .charts { grid-template-columns: 1fr; }
  @media (min-width: 760px) { .charts { grid-template-columns: 2fr 1fr; } }

  .chart-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 16px;
  }

  canvas { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #475569;
    padding: 0 8px 10px;
    border-bottom: 1px solid #1e2d45;
  }
  td {
    padding: 10px 8px;
    border-bottom: 1px solid #0f1928;
    color: #cbd5e1;
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  td.right, th.right { text-align: right; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .badge.profit { background:#14532d; color:#4ade80; }
  .badge.stop   { background:#4c0519; color:#f87171; }
  .badge.expire { background:#1e3a5f; color:#60a5fa; }
  .badge.manual { background:#3b2a00; color:#fbbf24; }
  .badge.skip   { background:#1e293b; color:#64748b; }

  .gran-btn.active { color: #4ade80; border-color: #166534; }
</style>
</head>
<body>

<header>
  <h1>Cash Cow <span>Agent</span></h1>
  <div class="header-right">
    <div class="updated" id="updated">Loading…</div>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleReveal()">Show $</button>
  </div>
</header>

<div class="grid stats" id="stats"></div>

<div class="grid charts" style="margin-top:16px;">
  <div class="card">
    <div class="chart-title">Cumulative Return %</div>
    <div style="position:relative;height:220px;overflow:hidden;">
      <canvas id="cumulChart"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="chart-title">Trade Outcomes</div>
    <div style="position:relative;height:220px;overflow:hidden;">
      <canvas id="pieChart"></canvas>
    </div>
  </div>
</div>

<div class="grid" style="margin-top:16px; grid-template-columns:1fr;">
  <div class="card">
    <div class="chart-title">Return % Per Day</div>
    <div style="position:relative;height:160px;overflow:hidden;">
      <canvas id="dailyChart"></canvas>
    </div>
  </div>
</div>

<div class="grid" style="margin-top:16px; grid-template-columns:1fr;">
  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
      <div>
        <div class="chart-title" style="margin-bottom:0;">Account Balance — 1Y Forecast</div>
        <div class="stat-sub" id="forecastSub"></div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="toggle-btn gran-btn" data-g="days" onclick="switchGranularity('days')">Days</button>
        <button class="toggle-btn gran-btn" data-g="weeks" onclick="switchGranularity('weeks')">Weeks</button>
        <button class="toggle-btn gran-btn active" data-g="months" onclick="switchGranularity('months')">Months</button>
      </div>
    </div>
    <div style="position:relative; height:260px;overflow:hidden;">
      <canvas id="balanceChart"></canvas>
    </div>
  </div>
</div>

<div class="grid" style="margin-top:16px; grid-template-columns:1fr;">
  <div class="card">
    <div class="chart-title">Trade History</div>
    <div style="overflow-x:auto;">
      <table id="tradeTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Result</th>
            <th>Dir</th>
            <th class="right">Short</th>
            <th class="right">Long</th>
            <th class="right">Return %</th>
            <th class="right">P&amp;L</th>
            <th class="right">Hold</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#1e2d45';

function toggleReveal() {
  const revealed = document.body.classList.toggle('revealed');
  const btn = document.getElementById('toggleBtn');
  btn.textContent = revealed ? 'Hide $' : 'Show $';
  btn.classList.toggle('revealed', revealed);
}

function badgeClass(r) {
  return {PROFIT:'profit',STOP:'stop',EXPIRE:'expire',EXPIRE_ITM:'stop',SKIP:'skip'}[r]||'skip';
}

function calcReturn(t) {
  if (t.result === 'SKIP' || !t.contracts) return 0;
  const w = Math.abs(t.short_strike - t.long_strike) || 1.0;
  const collateral = (w - Math.max(t.credit, 0)) * t.contracts * 100;
  return collateral > 0 ? (t.pnl / collateral) * 100 : 0;
}

function fmtPct(n) {
  if (n === 0) return '0.0%';
  return (n > 0 ? '+' : '') + n.toFixed(1) + '%';
}

function fmtDollar(n) {
  if (n === 0) return '$0.00';
  return (n > 0 ? '+' : '-') + '$' + Math.abs(n).toFixed(2);
}

function holdStr(m) {
  if (!m) return '—';
  return m < 60 ? m.toFixed(0)+'m' : (m/60).toFixed(1)+'h';
}

let _balChart = null, _byDayMap = null, _startBalance = 0, _balanceHistory = [];

function switchGranularity(g) {
  document.querySelectorAll('.gran-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.g === g);
  });
  _renderBalance(g);
}

function _renderBalance(granularity) {
  const byDay = _byDayMap;
  const startBal = _startBalance;
  const realHist = _balanceHistory;
  if (!byDay || !byDay.size) return;

  // Build daily balance series — use real snapshots where available,
  // fall back to P&L-summed for dates before we started recording.
  const realByDate = new Map();
  let netDeposits = 0;
  for (const h of realHist) {
    realByDate.set(h.date, h);
    netDeposits = h.net_deposits || 0;
  }

  const daily = [];
  let bal = startBal;
  const firstDate = [...byDay.keys()][0];
  if (firstDate) {
    const d0 = new Date(firstDate + 'T12:00:00');
    d0.setDate(d0.getDate() - 1);
    while (d0.getDay() === 0 || d0.getDay() === 6) d0.setDate(d0.getDate() - 1);
    daily.push({ date: d0.toISOString().slice(0, 10), bal: startBal });
  }
  for (const [d, day] of byDay) {
    const snap = realByDate.get(d);
    if (snap) {
      bal = snap.balance - (snap.net_deposits || 0) + netDeposits;
      bal = snap.balance;
      daily.push({ date: d, bal: +snap.balance.toFixed(2) });
    } else {
      bal += day.pnl;
      daily.push({ date: d, bal: +bal.toFixed(2) });
    }
  }

  let hist;
  if (granularity === 'weeks') {
    const map = new Map();
    for (const p of daily) {
      const dt = new Date(p.date + 'T12:00:00');
      const mon = new Date(dt);
      mon.setDate(dt.getDate() - ((dt.getDay() + 6) % 7));
      map.set(mon.toISOString().slice(0, 10), p);
    }
    hist = [...map.values()];
  } else if (granularity === 'months') {
    const map = new Map();
    for (const p of daily) map.set(p.date.slice(0, 7), p);
    hist = [...map.values()];
  } else {
    hist = daily;
  }

  // Use deposit-adjusted balance for return calculations
  const lastBal = daily[daily.length - 1].bal;
  const adjustedReturn = (lastBal - startBal - netDeposits) / startBal;
  const totalReturn = lastBal / startBal;
  const nDays = daily.length;
  const dailyRate = nDays > 1 ? Math.pow(totalReturn, 1 / nDays) - 1 : 0;
  const annualPct = (Math.pow(1 + dailyRate, 252) - 1) * 100;

  document.getElementById('forecastSub').textContent =
    'Based on ' + (dailyRate * 100).toFixed(2) + '% daily compound rate (' +
    annualPct.toFixed(0) + '% annualized)';

  let nPeriods, periodRate;
  if (granularity === 'weeks') {
    nPeriods = 52;
    periodRate = Math.pow(1 + dailyRate, 5) - 1;
  } else if (granularity === 'months') {
    nPeriods = 12;
    periodRate = Math.pow(1 + dailyRate, 21) - 1;
  } else {
    nPeriods = 252;
    periodRate = dailyRate;
  }

  const lastHist = hist[hist.length - 1];
  let fBal = lastHist.bal;
  let fDate = new Date(lastHist.date + 'T12:00:00');
  const forecast = [{ date: lastHist.date, bal: fBal }];

  for (let i = 0; i < nPeriods; i++) {
    if (granularity === 'days') {
      fDate.setDate(fDate.getDate() + 1);
      while (fDate.getDay() === 0 || fDate.getDay() === 6) fDate.setDate(fDate.getDate() + 1);
    } else if (granularity === 'weeks') {
      fDate.setDate(fDate.getDate() + 7);
    } else {
      fDate.setMonth(fDate.getMonth() + 1);
    }
    fBal *= (1 + periodRate);
    forecast.push({ date: fDate.toISOString().slice(0, 10), bal: +fBal.toFixed(2) });
  }

  const histLabels = hist.map(h => h.date.slice(5));
  const foreLabels = forecast.slice(1).map(f => f.date.slice(5));
  const allLabels = [...histLabels, ...foreLabels];

  const histData = [...hist.map(h => h.bal), ...new Array(foreLabels.length).fill(null)];
  const foreData = [...new Array(hist.length - 1).fill(null), lastHist.bal, ...forecast.slice(1).map(f => f.bal)];

  if (_balChart) _balChart.destroy();

  _balChart = new Chart(document.getElementById('balanceChart'), {
    type: 'line',
    data: {
      labels: allLabels,
      datasets: [
        {
          label: 'Actual',
          data: histData,
          borderColor: '#4ade80',
          backgroundColor: 'rgba(74,222,128,0.06)',
          pointBackgroundColor: '#4ade80',
          pointRadius: 2,
          fill: true,
          tension: 0.3,
        },
        {
          label: 'Forecast',
          data: foreData,
          borderColor: '#fbbf24',
          backgroundColor: 'rgba(251,191,36,0.04)',
          borderDash: [6, 3],
          pointRadius: 0,
          fill: true,
          tension: 0.3,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { padding: 16, boxWidth: 12 } },
      },
      scales: {
        x: {
          grid: { color: '#1e2d45' },
          ticks: { maxTicksLimit: 14 },
        },
        y: {
          grid: { color: '#1e2d45' },
          ticks: { callback: v => '$' + v.toLocaleString() },
        }
      }
    }
  });
}

async function init() {
  const res  = await fetch('data.json?_=' + Date.now());
  const data = await res.json();
  const { trades, summary } = data;
  const balanceHistory = data.balance_history || [];

  document.getElementById('updated').textContent = 'Updated ' + data.generated;

  const entered = trades.filter(t => t.result !== 'SKIP');
  const startBal = summary.starting_balance || 1225;
  const netDep = summary.net_deposits || 0;
  const realBal = summary.real_balance;
  const tradingPnl = summary.total_pnl;
  const acctReturn = startBal > 0 ? (tradingPnl / startBal) * 100 : 0;
  const acctColor = acctReturn >= 0 ? 'green' : 'red';
  const balDisplay = realBal != null ? '$' + realBal.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) : null;

  // ── Stats cards ────────────────────────────────────────────────
  document.getElementById('stats').innerHTML = `
    <div class="card">
      <div class="stat-label">Account Return</div>
      <div class="stat-value ${acctColor}">${fmtPct(acctReturn)}</div>
      <div class="stat-sub">(<span class="sens" style="color:${tradingPnl>=0?'#4ade80':'#f87171'}">${fmtDollar(tradingPnl)}</span>)</div>
    </div>
    <div class="card">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value neutral">${summary.win_rate}%</div>
    </div>
    <div class="card">
      <div class="stat-label">Trades</div>
      <div class="stat-value neutral">${summary.total_trades}</div>
    </div>
    <div class="card">
      <div class="stat-label">Avg Hold</div>
      <div class="stat-value neutral">${holdStr(summary.avg_hold_min)}</div>
    </div>
  `;

  // ── Aggregate trades by day (only after start date for charts) ───
  const startDate = summary.start_date || '';
  const byDay = new Map();
  for (const t of entered) {
    const d = t.date || '';
    if (d <= startDate) continue;
    if (!byDay.has(d)) byDay.set(d, { collatReturn: 0, pnl: 0 });
    const day = byDay.get(d);
    day.collatReturn += calcReturn(t);
    day.pnl += t.pnl;
  }

  // ── Cumulative chart — account return ────────────────────────────
  let runningBal = startBal;
  const cumulLabels = [], accountData = [];

  for (const [d, day] of byDay) {
    runningBal  += day.pnl;
    cumulLabels.push(d.slice(5));
    accountData.push(+((runningBal - startBal) / startBal * 100).toFixed(2));
  }

  new Chart(document.getElementById('cumulChart'), {
    type: 'line',
    data: {
      labels: cumulLabels,
      datasets: [
        {
          label: 'Account return',
          data: accountData,
          borderColor: '#4ade80',
          backgroundColor: 'rgba(74,222,128,0.06)',
          pointBackgroundColor: '#4ade80',
          pointRadius: 3,
          fill: true,
          tension: 0.3,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
      },
      scales: {
        x: { grid: { color: '#1e2d45' } },
        y: {
          grid: { color: '#1e2d45' },
          ticks: { callback: v => v.toFixed(1) + '%' },
        }
      }
    }
  });

  // ── Outcomes donut ───────────────────────────────────────────────
  const counts = {};
  for (const t of trades) counts[t.result] = (counts[t.result]||0) + 1;

  const allSlices = [
    { label: 'Profit',   count: counts.PROFIT||0,                            color: '#4ade80' },
    { label: 'Expire',   count: counts.EXPIRE||0,                            color: '#60a5fa' },
    { label: 'Stop/ITM', count: (counts.STOP||0)+(counts.EXPIRE_ITM||0),     color: '#f87171' },
    { label: 'Skip',     count: counts.SKIP||0,                              color: '#334155' },
  ].filter(s => s.count > 0);

  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: allSlices.map(s => s.label),
      datasets: [{
        data: allSlices.map(s => s.count),
        backgroundColor: allSlices.map(s => s.color),
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position:'bottom', labels:{ padding:16, boxWidth:12 } } },
      cutout: '65%',
    }
  });

  // ── Per-day % return bars ─────────────────────────────────────────
  const dailyLabels = [], dailyData = [];
  for (const [d, day] of byDay) {
    dailyLabels.push(d.slice(5));
    dailyData.push(+day.collatReturn.toFixed(2));
  }
  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: dailyLabels,
      datasets: [{
        data: dailyData,
        backgroundColor: dailyData.map(v => v >= 0 ? '#4ade80' : '#f87171'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: {
          grid: { color: '#1e2d45' },
          ticks: { callback: v => v.toFixed(1)+'%' },
        }
      }
    }
  });

  // ── Balance forecast chart ───────────────────────────────────────
  _byDayMap = byDay;
  _startBalance = startBal;
  _balanceHistory = balanceHistory;
  _renderBalance('months');

  // ── Trade table (no contracts, P&L blurred) ──────────────────────
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = [...entered].reverse().slice(0, 20).map(t => {
    const ret = calcReturn(t);
    const retColor = ret > 0 ? 'color:#4ade80' : ret < 0 ? 'color:#f87171' : '';
    const pnlColor2 = t.pnl > 0 ? '#4ade80' : t.pnl < 0 ? '#f87171' : '#94a3b8';
    return `<tr>
      <td>${t.date||'—'}</td>
      <td><span class="badge ${badgeClass(t.result)}">${t.result}</span></td>
      <td>${t.direction ? t.direction.toUpperCase() : '—'}</td>
      <td class="right">${t.short_strike||'—'}</td>
      <td class="right">${t.long_strike||'—'}</td>
      <td class="right" style="${retColor}">${t.result!=='SKIP' ? fmtPct(ret) : '—'}</td>
      <td class="right"><span class="sens" style="color:${pnlColor2}">${t.result!=='SKIP' ? fmtDollar(t.pnl) : '—'}</span></td>
      <td class="right">${holdStr(t.hold_min)}</td>
    </tr>`;
  }).join('');
}

init().catch(err => {
  document.body.innerHTML += `<p style="color:#f87171;text-align:center;margin-top:40px">Failed to load data.json: ${err}</p>`;
});
</script>
</body>
</html>
